# Based on example from
# https://github.com/vedantmgoyal2009/winget-releaser

name: Publish to WinGet

on:
  release:
    types: [released]
  workflow_dispatch:

jobs:
  publish:
    if: github.actor == github.repository_owner
    runs-on: windows-latest
    permissions:
      contents: read
      # Note: The WinGet action uses secrets.WINGET_TOKEN (PAT) for repository access,
      # not the default github_token, so additional permissions would be on that token
    steps:
      - uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: c3er.mdview
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
